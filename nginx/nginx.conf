worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Docker internal DNS resolver for runtime resolution
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;
        server_name _;

        # Root redirect to /slide-generator/
        location = / {
            return 302 /slide-generator/;
        }

        # Static uploads (thumbnails etc) → backend
        location /slide-generator/uploads/ {
            set $backend_upstream http://backend:8000;
            rewrite ^/slide-generator(/uploads/.*)$ $1 break;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_cache_valid 200 24h;
        }

        # Also serve uploads without prefix (for backward compat with stored paths)
        location /uploads/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream$request_uri;
            proxy_set_header Host $host;
            proxy_cache_valid 200 24h;
        }

        # API requests → backend (strip /slide-generator prefix)
        location /slide-generator/api/ {
            set $backend_upstream http://backend:8000;
            rewrite ^/slide-generator(/api/.*)$ $1 break;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts for LLM generation
            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Keep /api/ working directly too (backward compat)
        location /api/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Frontend under /slide-generator/ → Next.js (which has basePath set)
        location /slide-generator/ {
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Next.js HMR WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Next.js internal assets (_next/) under basePath
        location /slide-generator/_next/ {
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream$request_uri;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
