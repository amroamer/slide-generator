name: Trigger Deploy

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger infra deploy
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.INFRA_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/amroamer/kpmg-infra/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'